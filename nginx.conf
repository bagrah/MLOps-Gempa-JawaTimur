events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server mlops-gempa-jawatimur-api-service-1:5000;
        server mlops-gempa-jawatimur-api-service-2:5000;
        server mlops-gempa-jawatimur-api-service-3:5000;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://api_backend;
        }
    }
}