name: MLOps Gempa Automation Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mlflow scikit-learn

      - name: Ingest data from BMKG
        run: python -m src.data.ingest_data
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Preprocess data
        run: python -m src.data.preprocess
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run Training (before tests)
        run: python -m src.models.train
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run Tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Evaluate Model
        run: python -m src.models.evaluate_model
        env:
          PYTHONPATH: ${{ github.workspace }}
