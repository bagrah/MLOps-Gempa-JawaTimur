project:
  name: MLOps-Gempa-JawaTimur
  domain: Seismologi / Kebencanaan
  task: Klasifikasi Potensi Tsunami

data:
  source: BMKG Open Data API
  endpoints:
    - https://data.bmkg.go.id/DataMKG/TEWS/gempaterkini.json
    - https://data.bmkg.go.id/DataMKG/TEWS/gempadirasakan.json
  filter:
    region: Seluruh Indonesia
  raw_path: data/raw/batch/
  processed_path: data/processed/gempa_indonesia.csv

model:
  name: RandomForestClassifier
  features:
    - magnitude
    - kedalaman_km
    - lintang
    - bujur
    - jam
  target: potensi_tsunami
  threshold_accuracy: 0.85
  threshold_f1: 0.60

mlflow:
  experiment_name: tsunami-indonesia-experiment
  tracking_uri: sqlite:///mlflow.db
