version: "3.9"

services:
  mlflow-server:
    image: python:3.10-slim
    container_name: mlflow-server

    working_dir: /app

    volumes:
      - ./:/app
      - mlflow_data:/app/mlruns

    command: >
      sh -c "pip install mlflow &&
             mlflow ui --host 0.0.0.0 --port 5001"

    ports:
      - "5001:5001"

    networks:
      - mlops-network

  api-service:
    build: .

    container_name: api-service

    ports:
      - "5000:5000"

    depends_on:
      - mlflow-server

    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge

volumes:
  mlflow_data:
