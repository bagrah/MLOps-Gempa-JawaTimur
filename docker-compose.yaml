services:
  mlflow-server:
    image: python:3.10-slim
    container_name: mlflow-server
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install mlflow &&
             mlflow ui --backend-store-uri sqlite:///mlflow.db --host 0.0.0.0 --port 5001"
    ports:
      - "5001:5001"
    networks:
      - mlops-network

  api-service:
    build: .
    volumes:
      - ./:/app
    deploy:
      replicas: 3
    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge
