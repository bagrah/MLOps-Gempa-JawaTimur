services:
  mlflow-server:
    image: python:3.10-slim
    container_name: mlflow-server
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install mlflow &&
             mlflow ui --backend-store-uri sqlite:///mlflow.db --host 0.0.0.0 --port 5001"
    ports:
      - "5001:5001"
    networks:
      - mlops-network

  api-service:
    build:
      context: .
      platforms:
        - linux/amd64
    volumes:
      - ./:/app
    deploy:
      replicas: 3
    networks:
      - mlops-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-service
    networks:
      - mlops-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - mlops-network
    depends_on:
      - api-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - mlops-network
    depends_on:
      - prometheus

networks:
  mlops-network:
    driver: bridge

volumes:
  grafana_data: